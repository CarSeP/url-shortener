<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>URL Shortener</title>
        <link rel="stylesheet" href="app.css" />
        <script type="module" src="app.js"></script>
    </head>
    <body>
        <nav class="top-nav">
            <div id="userSection" style="display: none; align-items: center; gap: 1rem;">
                <img id="userAvatar" src="" alt="Avatar" style="width: 32px; height: 32px; border-radius: 50%;" />
                <span id="userName"></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
            <a href="auth/github" id="loginLink" class="login-link">Login</a>
        </nav>
        <main>
            <div class="hero">
                <h1>Shorten your links.</h1>
                <p>
                    Turn long URLs into short, memorable links. Fast, simple,
                    and reliable.
                </p>
            </div>

            <div class="shortener-card">
                <form>
                    <div class="input-group">
                        <input
                            type="url"
                            class="url-input"
                            id="urlInput"
                            placeholder="https://www.google.com/"
                            required
                        />
                        <button type="submit" class="btn-shorten">
                            Shorten
                        </button>
                    </div>
                </form>
                <div class="result-container" id="resultContainer" style="display: none;">
                    <span class="result-label">YOUR SHORTENED LINK:</span>
                    <div class="result-url">
                        <a
                            href="#"
                            class="shortened-url"
                            id="shortenedUrl"
                            target="_blank"
                        ></a>
                        <button class="btn-copy" id="btnCopy">
                            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
